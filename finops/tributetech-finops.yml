description: >-
  FinOps view of Tribute Technology spend. The Tribute Store API is not billed as
  a metered developer product - it is a partner integration surface bundled with
  a funeral home's Tribute Technology subscription. For a funeral home, the cost
  driver is the software subscription (management software has been advertised
  around $49/month) plus any add-on products (memorial websites, Tribute Store
  e-commerce, obituary tools) and transaction-based Tribute Pay processing fees on
  payments and e-commerce orders. For an integration partner, direct API cost is
  established by a partner agreement rather than per-call metering; the partner's
  own spend is the engineering and infrastructure to run the allowlisted
  integration server.
notes: >-
  Per-call API pricing is not published; the API is bundled. Subscription and
  transaction figures are directional - reconcile funeral-home subscription
  tiers, e-commerce revenue share, and Tribute Pay processing rates directly with
  Tribute Technology.
