meters:
- name: software_subscription
  description: Monthly funeral-home subscription for management software and website hosting.
  unit: months
  aggregation: sum
  dimensions:
  - funeral_home
  - product
- name: ecommerce_orders
  description: Tribute Store e-commerce orders (flowers and personalized products) placed on obituary pages.
  unit: orders
  aggregation: sum
  dimensions:
  - funeral_home
  - obituary
- name: payment_processing
  description: Tribute Pay payment and funeral-funding transactions, billed on a processing-fee basis.
  unit: transactions
  aggregation: sum
  dimensions:
  - funeral_home
- name: partner_integration
  description: Integration-partner engineering and infrastructure to run the allowlisted Tribute Store API integration (no per-call Tribute fee).
  unit: hours
  aggregation: sum
  dimensions:
  - partner
principles:
- name: Visibility
  description: Track subscription cost per funeral home per product, and separate transaction-based Tribute Pay and e-commerce charges from fixed subscription spend.
- name: Allocation
  description: Attribute subscription and transaction costs per funeral-home rooftop (serving location) and per product bundle.
- name: Optimization
  description: Right-size product bundles per rooftop; avoid redundant API writes (push only on change) to keep integration infrastructure lean.
- name: Accountability
  description: Assign an owner per funeral-home account; review monthly subscription plus transaction fees against volume of obituaries and orders.
