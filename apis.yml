apis:
- aid: tributetech:tributetech-authentication-api
  name: Tribute Store Authentication API
  tags:
  - Authentication
  - Tokens
  - Funeral Homes
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.tributetech.com/
  baseURL: https://api.tributecenteronline.com
  endpointsModeled: true
  properties:
  - url: https://awheeler.funeraltechweb2.com/additional-service-info/file/3/Tribute%20Store%20API%20Documentation%201.1.pdf
    type: Documentation
  - url: openapi/tributetech-openapi.yml
    type: OpenAPI
  - url: collections/tributetech.postman_collection.json
    type: PostmanCollection
  - url: collections/tributetech.opencollection.json
    type: OpenCollection
  description: Exchange a funeral home's HostName/UserName/Password triple (scoped
    to your integrator Provider credential) for a short-lived HTML bearer token via
    POST /token/. The token identifies the funeral home on all other endpoints.
    Requires an IP allowlist entry. Endpoints modeled from the public Tribute Store
    API Documentation 1.1 (March 2019); the API is partner-gated with no public
    self-service portal.
- aid: tributetech:tributetech-serving-locations-api
  name: Tribute Store Serving Locations API
  tags:
  - Serving Locations
  - Funeral Homes
  - Rooftops
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.tributetech.com/
  baseURL: https://api.tributecenteronline.com
  endpointsModeled: true
  properties:
  - url: https://awheeler.funeraltechweb2.com/additional-service-info/file/3/Tribute%20Store%20API%20Documentation%201.1.pdf
    type: Documentation
  - url: openapi/tributetech-openapi.yml
    type: OpenAPI
  - url: collections/tributetech.postman_collection.json
    type: PostmanCollection
  - url: collections/tributetech.opencollection.json
    type: OpenCollection
  description: Create or update funeral-home serving locations (rooftops) that
    obituaries attach to, retrieve a location by its Tribute Store serving-location
    id, list all locations, and list the predefined location types (Cemetery,
    Church, Funeral Home, Memorial). Posting a previously used application Id
    updates the existing record. Endpoints modeled from the public Tribute Store
    API Documentation 1.1.
- aid: tributetech:tributetech-obituaries-api
  name: Tribute Store Obituaries API
  tags:
  - Obituaries
  - Cases
  - Memorials
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.tributetech.com/tribute-obituary-writer
  baseURL: https://api.tributecenteronline.com
  endpointsModeled: true
  properties:
  - url: https://awheeler.funeraltechweb2.com/additional-service-info/file/3/Tribute%20Store%20API%20Documentation%201.1.pdf
    type: Documentation
  - url: openapi/tributetech-openapi.yml
    type: OpenAPI
  - url: collections/tributetech.postman_collection.json
    type: PostmanCollection
  - url: collections/tributetech.opencollection.json
    type: OpenCollection
  description: Push obituary cases - the deceased, obituary text, service events
    (visitation, service), and a base64 photo thumbnail - via POST
    /api/external-case/post, using your CaseId as an add/update key. Each success
    returns a Tribute Store OBITUARY_ID and auto-provisions a personalized Tribute
    Store page reachable at the store base URL with ?oId={OBITUARY_ID}. Retrieve a
    single obituary or list obituary summaries with OData paging/sorting. Endpoints
    modeled from the public Tribute Store API Documentation 1.1.
