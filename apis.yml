aid: tributetech
url: https://raw.githubusercontent.com/api-evangelist/tributetech/refs/heads/main/apis.yml
name: Tribute Technology
kind: company
description: Tribute Technology is a funeral-home technology company serving over
  9,000 funeral homes across the US and Canada with obituary publishing, memorial
  websites, funeral-home management software, online payments (Tribute Pay), and
  e-commerce (flowers and personalized products) through the Tribute Store. For
  partners, Tribute Technology exposes the Tribute Store API - a partner-gated,
  REST-style JSON API that lets funeral-home case-management systems authenticate
  a funeral home, push its serving locations (rooftops), and push obituary cases
  that automatically provision a personalized Tribute Store page for each
  deceased. Access requires a Provider credential, an IP allowlist, and a
  per-funeral-home HostName/UserName/Password triple exchanged for a bearer token;
  there is no public self-service developer portal.
